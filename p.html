<!DOCTYPE html>
<html lang="en-us">

<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@main/people-playground/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | People Playground</title>

    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #unity-container {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            background: #000;
        }

        #loading-text {
            color: white;
            font-size: 48px;
            font-family: cursive;
            text-align: center;
            margin-top: 20px;
        }

        #unity-warning {
            position: absolute;
            left: 50%;
            top: 10px;
            transform: translateX(-50%);
            z-index: 9999;
        }

        /* AD SYSTEM */

        #ad-container {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: min(728px, calc(100% - 20px));
            height: 90px;
            background: rgba(0,0,0,.9);
            display: none;
            z-index: 99999;
            overflow: hidden;
            transition: transform .5s ease-in-out;
            box-shadow: 0 -2px 12px rgba(0,0,0,.45);
        }

        #ad-container.hidden {
            transform: translate(-50%,100%);
        }

        #ad-iframe {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 745px;
            height: 90px;
            border: 0;
        }

        #close-ad {
            position: absolute;
            top: 6px;
            right: 8px;
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 9px;
            font-size: 13px;
            border-radius: 4px;
            cursor: not-allowed;
            opacity: .72;
            z-index: 100000;
        }

        #close-ad.enabled {
            cursor: pointer;
            opacity: 1;
        }

        #close-ad::before {
            content: '↓ ';
        }
    </style>
</head>

<body>

<div id="loading-text">
    LOADING... (
    <a href="https://sites.google.com/view/classroomcentral-/" target="_blank">
        Classroom Central Site!
    </a>
    )
</div>

<div id="unity-container" hidden>

    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="unity-loading-bar">
        <div id="unity-logo"></div>

        <div id="unity-progress-bar-empty">
            <div id="unity-progress-bar-full"></div>
        </div>
    </div>

    <div id="unity-warning"></div>
</div>

<script>

const container = document.querySelector("#unity-container");
const canvas = document.querySelector("#unity-canvas");
const loadingBar = document.querySelector("#unity-loading-bar");
const progressBarFull = document.querySelector("#unity-progress-bar-full");
const warningBanner = document.querySelector("#unity-warning");

function unityShowBanner(msg, type) {

    function updateBannerVisibility() {
        warningBanner.style.display =
            warningBanner.children.length ? 'block' : 'none';
    }

    const div = document.createElement('div');

    div.innerHTML = msg;

    warningBanner.appendChild(div);

    if (type === 'error') {
        div.style = 'background:red;padding:10px;';
    } else {

        if (type === 'warning') {
            div.style = 'background:yellow;padding:10px;';
        }

        setTimeout(() => {
            warningBanner.removeChild(div);
            updateBannerVisibility();
        }, 5000);
    }

    updateBannerVisibility();
}

/* MERGE SPLIT FILES */

function mergeFiles(fileParts) {

    return new Promise((resolve, reject) => {

        let buffers = [];

        function fetchPart(index) {

            if (index >= fileParts.length) {

                const mergedBlob = new Blob(buffers);

                const mergedFileUrl =
                    URL.createObjectURL(mergedBlob);

                resolve(mergedFileUrl);

                return;
            }

            fetch(fileParts[index])
                .then(response => response.arrayBuffer())
                .then(data => {

                    buffers.push(data);

                    fetchPart(index + 1);

                })
                .catch(reject);
        }

        fetchPart(0);
    });
}

function getParts(file, start, end) {

    let parts = [];

    for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
    }

    return parts;
}

Promise.all([

    mergeFiles(getParts("Build/PPG.wasm", 1, 3)),
    mergeFiles(getParts("Build/PPG.data", 1, 6))

]).then(([wasmUrl, dataUrl]) => {

    container.hidden = false;

    const buildUrl = "Build";

    const loaderUrl =
        buildUrl + "/PPG.loader.js";

    const config = {

        dataUrl: dataUrl,

        frameworkUrl:
            buildUrl + "/PPG.framework.js",

        codeUrl: wasmUrl,

        streamingAssetsUrl:
            "StreamingAssets",

        companyName:
            "Studio Minus",

        productName:
            "People Playground",

        productVersion:
            "0"
    };

    if (/iPhone|iPad|iPod|Android/i
        .test(navigator.userAgent)) {

        const meta =
            document.createElement('meta');

        meta.name = 'viewport';

        meta.content =
            'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';

        document.head.appendChild(meta);

        container.className = "unity-mobile";
        canvas.className = "unity-mobile";

    } else {

        function resizeCanvas() {

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            canvas.style.width =
                window.innerWidth + "px";

            canvas.style.height =
                window.innerHeight + "px";
        }

        resizeCanvas();

        window.addEventListener(
            'resize',
            resizeCanvas
        );
    }

    loadingBar.style.display = "block";

    const script =
        document.createElement("script");

    script.src = loaderUrl;

    script.onload = () => {

        createUnityInstance(
            canvas,
            config,
            (progress) => {

                progressBarFull.style.width =
                    (100 * progress) + "%";
            }

        ).then((unityInstance) => {

            loadingBar.style.display = "none";

            document
                .querySelector("#loading-text")
                .remove();

        }).catch((message) => {

            alert(message);

        });
    };

    document.body.appendChild(script);
});

</script>

</body>
</html>
